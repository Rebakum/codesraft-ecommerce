<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/image/fav.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brew &amp; Bean - Premium Coffee</title>
    <meta name="description" content="Premium artisan coffee sourced from the world's finest single-origin farms." />
    <script>
      // FOUC prevention: apply dark class before first paint
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
          document.body.style.backgroundColor = '#1a0f08';
          document.body.style.color = '#f5e6d0';
        } else {
          document.documentElement.classList.remove('dark');
          document.body.style.backgroundColor = '#fdf8f0';
          document.body.style.color = '#3e2715';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
